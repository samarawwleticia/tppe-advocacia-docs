site_name: Documentação Técnica
site_description: Documentação técnica do projeto de advocacia
site_author: Equipe 8 de TPPE
site_url: https://Projeto-Advocacia-TPPE.github.io/tppe-advocacia-docs

repo_name: Projeto-Advocacia-TPPE/tppe-advocacia-docs
repo_url: https://github.com/Projeto-Advocacia-TPPE/tppe-advocacia-docs

theme:
  name: material
  language: pt
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Alternar para modo escuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Alternar para modo claro
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy

plugins:
  - search:
      lang: pt

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Inicio: index.md
  - Backlog:
    - Visão Geral: backlog/index.md
    - Status da Implementação: backlog/status.md
    - Requisitos: backlog/requisitos.md
  - Arquitetura:
    - Estrutura Atual: arquitetura/estrutura-inicial.md
    - Modelo Físico do Banco: arquitetura/modelo-fisico.md
